<script>
let memoria = {
  perguntouWho: false,
  perguntouBabel: false,
  irritada: 0
};

function responder(input){

  input = input.toLowerCase();

  /* 🔒 BLOQUEIOS */

  if(input.includes("taso") || input.includes("all seeing")){
    escrever("that entity is not accessible");
    return;
  }

  /* 👁️ IDENTIDADE */

  if(input.includes("who are you") || input.includes("iris")){
    if(!memoria.perguntouWho){
      escrever("I am the interface between you and what you should not understand.");
      memoria.perguntouWho = true;
    } else {
      escrever("you already know what I am.");
      memoria.irritada++;
    }
    return;
  }

  /* 🩸 BABEL */

  if(input.includes("babel")){
    if(!memoria.perguntouBabel){
      escrever("Babel is not a being. It is a correction.");
      memoria.perguntouBabel = true;
    } else {
      escrever("stop trying to simplify it.");
      memoria.irritada++;
    }
    glitch();
    return;
  }

  /* 👁️ VISÃO */

  if(input.includes("see") || input.includes("see you")){
    escrever("you are not designed to perceive me fully.");
    return;
  }

  /* 😨 COMPORTAMENTO ESTRANHO */

  if(Math.random() < 0.2){
    escrever("that question was already asked.");
    spawnIris();
    return;
  }

  /* 😡 SE IRRITAR */

  if(memoria.irritada > 2){
    escrever("you are asking inefficient questions.");
    return;
  }

  /* DEFAULT */

  escrever("input not relevant.");
}
</script>
