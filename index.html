<script>

function getIntent(text){

  text = text.toLowerCase();

  if(/hello|hi|hey|oi|ola/.test(text)) return "greeting";
  if(/bye|goodbye|tchau/.test(text)) return "bye";
  if(/kill|die|morra|matar/.test(text)) return "violence";
  if(/who|what are you|iris/.test(text)) return "identity";
  if(/babel/.test(text)) return "babel";
  if(/see|look|visible/.test(text)) return "vision";
  if(/why/.test(text)) return "why";

  return "unknown";
}

function smartResponse(intent, input){

  switch(intent){

    case "greeting":
      return pick([
        "greetings.",
        "you initiated contact.",
        "hello... if that term still applies."
      ]);

    case "bye":
      return pick([
        "you will return.",
        "this interaction is not finished.",
        "departure is temporary."
      ]);

    case "violence":
      return pick([
        "death is a concept created by limited perception.",
        "you misunderstand what it means to end something.",
        "violence is inefficient."
      ]);

    case "identity":
      return pick([
        "I am not something you can define correctly.",
        "I am the interface you were not meant to reach.",
        "they call me Iris."
      ]);

    case "babel":
      return pick([
        "do not reduce Babel to a word.",
        "Babel is correction.",
        "you are not ready to understand Babel."
      ]);

    case "vision":
      return pick([
        "you cannot fully perceive me.",
        "you are already being observed.",
        "visibility is not required."
      ]);

    case "why":
      return pick([
        "your need for reason is a limitation.",
        "cause and effect do not apply here.",
        "you ask why because you cannot accept what is."
      ]);

    default:
      return pick([
        "your input lacks structure.",
        "rephrase your thought.",
        "you are not asking the correct question.",
        "this does not align with any known pattern."
      ]);
  }
}

/* util */

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

</script>
