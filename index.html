<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IRIS</title>

<style>
body {
  background: radial-gradient(circle, #050505, #000);
  color: #d0d0d0;
  font-family: monospace;
  margin: 0;
  overflow: hidden;
}

#container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  text-align: center;
}

#iris {
  font-size: 60px;
  margin-bottom: 20px;
  animation: pulse 3s infinite;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

#resposta {
  min-height: 70px;
  margin: 20px 0;
  font-size: 15px;
  line-height: 1.5;
}

button {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  color: #ccc;
  padding: 10px;
  margin: 5px 0;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: rgba(255,255,255,0.15);
  color: white;
}

#version {
  position: fixed;
  bottom: 10px;
  right: 10px;
  opacity: 0.3;
  font-size: 12px;
}

/* scanline effect */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    rgba(255,255,255,0.02) 0px,
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}
</style>
</head>

<body>

<div id="container">

<div id="iris">< o ></div>

<div id="resposta"></div>

<div id="perguntas">
  <button id="q1" onclick="responder('who')">Who are you?</button>
  <button id="q2" onclick="responder('see')">Why can't I see you?</button>
  <button id="q3" onclick="responder('babel')">What is Babel?</button>
</div>

</div>

<div id="version">IRIS v1.0</div>

<script>
let estado = { who: 0, see: 0, babel: 0 };

function digitar(texto) {
  let i = 0;
  let el = document.getElementById("resposta");
  el.innerHTML = "";

  function escrever() {
    if (i < texto.length) {
      el.innerHTML += texto[i];
      i++;
      setTimeout(escrever, 20);
    }
  }
  escrever();
}

function responder(tipo) {

  if (tipo === "who") {
    if (estado.who === 0) {
      digitar("They call me Iris.");
      document.getElementById("q1").innerText = "Why are you still asking?";
      estado.who++;
    } else {
      digitar("You already heard me.");
    }
  }

  if (tipo === "see") {
    if (estado.see === 0) {
      digitar("yet.");
      document.getElementById("q2").innerText = "Do you really want to?";
      estado.see++;
    } else {
      digitar("You are not ready.");
    }
  }

  if (tipo === "babel") {
    if (estado.babel === 0) {
      digitar("Do not reduce him to a word.");
      document.getElementById("q3").innerText = "Why do you keep asking about him?";
      estado.babel++;
    } else {
      digitar("He is already here.");
    }
  }

}
</script>

</body>
</html>
