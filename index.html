<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IRIS</title>

<style>
body {
  background: black;
  color: #e5e5e5;
  font-family: "Courier New", monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
}

#container {
  width: 400px;
  text-align: center;
}

#iris {
  font-size: 50px;
  margin-bottom: 20px;
  letter-spacing: 10px;
  opacity: 0.8;
}

#resposta {
  min-height: 60px;
  margin: 20px 0;
  font-size: 16px;
}

button {
  width: 100%;
  background: transparent;
  border: 1px solid #444;
  color: #aaa;
  padding: 10px;
  margin: 5px 0;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  border-color: white;
  color: white;
}

#version {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 12px;
  opacity: 0.3;
}
</style>
</head>

<body>

<div id="container">

<div id="iris">< o ></div>

<div id="resposta"></div>

<div id="perguntas">
  <button id="q1" onclick="responder('who')">Who are you?</button>
  <button id="q2" onclick="responder('see')">Why can't I see you?</button>
  <button id="q3" onclick="responder('babel')">What is Babel?</button>
</div>

</div>

<div id="version">IRIS v1.0</div>

<script>
let estado = {
  who: 0,
  see: 0,
  babel: 0
};

function digitar(texto) {
  let i = 0;
  let el = document.getElementById("resposta");
  el.innerHTML = "";

  function escrever() {
    if (i < texto.length) {
      el.innerHTML += texto[i];
      i++;
      setTimeout(escrever, 25);
    }
  }

  escrever();
}

function responder(tipo) {

  if (tipo === "who") {
    if (estado.who === 0) {
      digitar("They call me Iris.");
      document.getElementById("q1").innerText = "Why are you still asking?";
      estado.who++;
    } else {
      digitar("You already heard me.");
    }
  }

  if (tipo === "see") {
    if (estado.see === 0) {
      digitar("yet.");
      document.getElementById("q2").innerText = "Do you really want to?";
      estado.see++;
    } else {
      digitar("You are not ready.");
    }
  }

  if (tipo === "babel") {
    if (estado.babel === 0) {
      digitar("Do not reduce him to a word.");
      document.getElementById("q3").innerText = "Why do you keep asking about him?";
      estado.babel++;
    } else {
      digitar("He is already here.");
    }
  }

}
</script>

</body>
</html>
