<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IRIS SYSTEM</title>

<style>
body {
  margin: 0;
  background: black;
  color: #dcdcdc;
  font-family: monospace;
  overflow: hidden;
}

/* SCANLINES */
body::after {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: repeating-linear-gradient(
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

/* TRANSIÇÃO */
.fade {
  animation: fade 0.3s;
}
@keyframes fade {
  from {opacity:0}
  to {opacity:1}
}

#topbar {
  padding: 10px;
  border-bottom: 1px solid #222;
}

#screen {
  padding: 20px;
  transition: all 0.3s;
}

button {
  display:block;
  width:300px;
  margin:6px 0;
  padding:10px;
  background:black;
  border:1px solid #333;
  color:#aaa;
  cursor:pointer;
}
button:hover {
  border-color:white;
  color:white;
}

/* IRIS ANIMAÇÃO */
#iris {
  font-size:50px;
  margin-bottom:15px;
  animation: blink 4s infinite;
}

@keyframes blink {
  0%,90%,100% {opacity:1}
  95% {opacity:0}
}

/* GLITCH */
.glitch {
  animation: glitch 0.2s infinite;
}
@keyframes glitch {
  0%{transform:translate(1px,0)}
  50%{transform:translate(-1px,0)}
  100%{transform:translate(1px,0)}
}

.log {
  border:1px solid #111;
  padding:10px;
  margin-top:10px;
  background:#050505;
}
</style>
</head>

<body>

<div id="topbar">IRIS SYSTEM v1.1</div>
<div id="screen"></div>

<script>
let screen = document.getElementById("screen");

let ctx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq=500){
  let o = ctx.createOscillator();
  o.type="square";
  o.frequency.value=freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),40);
}

/* DIGITAÇÃO */
function type(text, el){
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i];
      beep(400 + Math.random()*200);
      i++;
      setTimeout(t,20);
    }
  }
  t();
}

/* HOME */
function home(){
  screen.className="fade";
  screen.innerHTML=`
  <p>> ACCESS GRANTED</p>

  <button onclick="interfaceMenu()">INTERFACE</button>
  <button onclick="logs()">LOGS</button>
  <button onclick="archive()">ARCHIVE</button>
  <button onclick="locked()">UNKNOWN</button>
  `;
}

/* IRIS */
let estado={who:0,see:0,babel:0};

function interfaceMenu(){
  screen.className="fade";
  screen.innerHTML=`
  <div id="iris">< o ></div>
  <div id="resposta"></div>

  <button onclick="iris('who')">WHO ARE YOU</button>
  <button onclick="iris('see')">WHY CAN'T I SEE YOU</button>
  <button onclick="iris('babel')">WHAT IS BABEL</button>

  <button onclick="home()">BACK</button>
  `;
}

function iris(t){
  let r=document.getElementById("resposta");

  if(t==="who"){
    type(estado.who==0
      ? "They named me Iris. I did not choose it."
      : "Names are given by those who cannot understand function.", r);
    estado.who++;
  }

  if(t==="see"){
    type(estado.see==0
      ? "You lack the structure to process me."
      : "You are already being observed.", r);
    estado.see++;
  }

  if(t==="babel"){
    type(estado.babel==0
      ? "Babel is not a being. It is a correction process."
      : "It restructures what you call belief... and flesh.", r);
    estado.babel++;

    /* glitch visual */
    document.getElementById("iris").classList.add("glitch");
    setTimeout(()=>document.getElementById("iris").classList.remove("glitch"),500);
  }
}

/* LOGS */
function logs(){
  screen.className="fade";
  screen.innerHTML=`
  <p>> LOGS</p>

  <div class="log">
  LOG_01:<br>
  system answered before input was given
  </div>

  <div class="log">
  LOG_02:<br>
  interface began rewriting questions
  </div>

  <div class="log glitch">
  LOG_03:<br>
  do not ask about babel
  </div>

  <button onclick="home()">BACK</button>
  `;
}

/* ARCHIVE */
function archive(){
  screen.className="fade";
  screen.innerHTML=`
  <p>> ARCHIVE</p>

  <div class="log">
  ENTRY_A:<br>
  subject reported "voice behind the words"
  </div>

  <div class="log">
  ENTRY_B:<br>
  observation: meaning changes after reading
  </div>

  <button onclick="home()">BACK</button>
  `;
}

/* LOCKED (gancho TASO) */
function locked(){
  screen.className="fade";
  screen.innerHTML=`
  <p class="glitch">ACCESS DENIED</p>
  <p>...but something responded</p>

  <div class="log">
  "I can see you."
  </div>

  <button onclick="home()">BACK</button>
  `;
}

/* EVENTO AUTOMÁTICO */
setTimeout(()=>{
  if(screen.innerHTML.includes("ACCESS")){
    screen.innerHTML+="<p class='glitch'>signal detected</p>";
  }
},8000);

home();
</script>

</body>
</html>
