<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IRIS SYSTEM</title>

<style>
body{
  margin:0;
  background:#020202;
  color:#dcdcdc;
  font-family:monospace;
  overflow:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    linear-gradient(#111 1px, transparent 1px),
    linear-gradient(90deg,#111 1px, transparent 1px);
  background-size:40px 40px;
  opacity:0.2;
}

body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
}

#container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  max-width:900px;
  z-index:10;
}

#header{
  border-bottom:1px solid #333;
  padding-bottom:10px;
  display:flex;
  justify-content:space-between;
}

#status{
  opacity:0.5;
}

#output{
  min-height:120px;
  margin:20px 0;
  line-height:1.5;
}

input{
  width:100%;
  max-width:600px;
  display:block;
  margin:20px auto 0 auto;
  background:none;
  border:none;
  border-bottom:1px solid #444;
  color:white;
  font-size:16px;
  outline:none;
  padding:10px;
}

input:focus{
  border-bottom:1px solid #888;
}

#side{
  position:absolute;
  right:20px;
  top:20px;
  font-size:12px;
  opacity:0.3;
}

#iris{
  position:absolute;
  font-size:25px;
  opacity:0.5;
  animation:blink 6s infinite;
}

@keyframes blink{
  0%,95%,100%{opacity:0.5}
  97%{opacity:0}
}

.glitch{
  animation:glitch 0.15s infinite;
}
@keyframes glitch{
  0%{transform:translate(2px,0)}
  50%{transform:translate(-2px,0)}
  100%{transform:translate(2px,0)}
}
</style>
</head>

<body
