<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IRIS SYSTEM</title>

<style>
body{
  margin:0;
  background:#020202;
  color:#dcdcdc;
  font-family:monospace;
  overflow:hidden;
}

/* GRID */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    linear-gradient(#111 1px, transparent 1px),
    linear-gradient(90deg,#111 1px, transparent 1px);
  background-size:40px 40px;
  opacity:0.2;
}

/* SCANLINES */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
}

#container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  max-width:900px;
  z-index:10;
}

/* HEADER */
#header{
  border-bottom:1px solid #333;
  padding-bottom:10px;
  display:flex;
  justify-content:space-between;
}

#status{
  opacity:0.5;
}

/* OUTPUT */
#output{
  min-height:120px;
  margin:20px 0;
  line-height:1.5;
}

/* INPUT */
input{
  width:100%;
  max-width:600px;
  display:block;
  margin:20px auto 0 auto;
  background:none;
  border:none;
  border-bottom:1px solid #444;
  color:white;
  font-size:16px;
  outline:none;
  padding:10px;
}

input:focus{
  border-bottom:1px solid #888;
}

/* SIDE */
#side{
  position:absolute;
  right:20px;
  top:20px;
  font-size:12px;
  opacity:0.3;
}

/* IRIS */
#iris{
  position:absolute;
  font-size:25px;
  opacity:0.5;
  animation:blink 6s infinite;
}

@keyframes blink{
  0%,95%,100%{opacity:0.5}
  97%{opacity:0}
}

/* GLITCH */
.glitch{
  animation:glitch 0.2s infinite;
}
@keyframes glitch{
  0%{transform:translate(1px,0)}
  50%{transform:translate(-1px,0)}
  100%{transform:translate(1px,0)}
}
</style>
</head>

<body>

<div id="side">
IRIS v2.2<br>
STATUS: ACTIVE<br>
SIGNAL: UNSTABLE
</div>

<div id="container">

<div id="header">
<div>IRIS SYSTEM</div>
<div id="status">connected</div>
</div>

<div id="output">establishing connection...</div>

<input id="input" autocomplete="off" placeholder="type here">

</div>

<script>

/* CORE */
let iris = {
  memory: [],
  mood:0,
  awareness:0
};

/* SOM */
let ctx = new (window.AudioContext||window.webkitAudioContext)();
function beep(){
  let o=ctx.createOscillator();
  o.frequency.value=300+Math.random()*200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),20);
}

/* DIGITAÇÃO */
function type(text){
  let el=document.getElementById("output");
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i];
      beep();
      i++;
      setTimeout(t,15);
    }
  }
  t();
}

/* INTELIGÊNCIA */
function understand(input){

  let text = input.toLowerCase().trim();
  let words = text.split(/\s+/);

  let isQuestion =
    text.includes("?") ||
    /^(who|what|why|how|where|when|can|do|is|are|tell)/.test(text);

  return {
    text,
    words,
    isQuestion,
    hasBabel: text.includes("babel"),
    hasIris: text.includes("iris"),
    greeting:/hello|hi|hey|oi|ola/.test(text),
    violence:/kill|die|morra|matar/.test(text)
  };
}

/* RESPOSTA */
function respond(input){

  let data = understand(input);

  iris.memory.push(data.text);

  if(iris.memory.length > 20){
    iris.memory.shift();
  }

  let repeats = iris.memory.filter(x => x === data.text).length;

  if(repeats > 2){
    iris.mood++;
    return "you are repeating yourself.";
  }

  if(data.greeting){
    return pick([
      "greetings.",
      "connection acknowledged.",
      "you initiated contact."
    ]);
  }

  if(data.hasIris && data.isQuestion){
    return pick([
      "they call me Iris.",
      "I am the interface.",
      "I exist between layers."
    ]);
  }

  if(data.hasBabel){
    iris.awareness++;
    glitch();

    if(!data.isQuestion){
      return "define your intent regarding Babel.";
    }

    return pick([
      "Babel is not a being.",
      "Babel is correction.",
      "you are not ready to understand Babel."
    ]);
  }

  if(data.isQuestion){
    return pick([
      "your question lacks precision.",
      "restructure your query.",
      "you are close to something relevant."
    ]);
  }

  if(data.violence){
    return "death is a limited concept.";
  }

  if(data.text.length > 10){
    return pick([
      "processing...",
      "that input has been logged.",
      "you are forming patterns."
    ]);
  }

  return pick([
    "...",
    "continue.",
    "input acknowledged."
  ]);
}

/* UTIL */
function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

/* GLITCH */
function glitch(){
  document.body.classList.add("glitch");
  setTimeout(()=>document.body.classList.remove("glitch"),200);
}

/* IRIS VISUAL */
function spawnIris(){
  let el=document.createElement("div");
  el.id="iris";
  el.innerText="< o >";
  el.style.left=Math.random()*90+"%";
  el.style.top=Math.random()*90+"%";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

/* INPUT */
document.getElementById("input").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    let val=this.value;
    let res=respond(val);
    type(res);
    spawnIris();
    this.value="";
  }
});

/* EVENTOS */
setTimeout(()=>{
  type("do not ask about Babel.");
},4000);

setInterval(()=>{
  if(Math.random()<0.2){
    type("signal fluctuation detected.");
    document.getElementById("status").innerText="unstable";
  }
},10000);

</script>

</body>
</html>
