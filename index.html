<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IRIS</title>

<style>
body {
  background-color: black;
  color: white;
  font-family: monospace;
  text-align: center;
  padding-top: 100px;
}

#iris {
  font-size: 40px;
  margin-bottom: 30px;
}

#resposta {
  margin-top: 30px;
  min-height: 40px;
}

button {
  background: none;
  border: 1px solid white;
  color: white;
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  background: white;
  color: black;
}

#version {
  position: fixed;
  bottom: 10px;
  right: 10px;
  opacity: 0.5;
  font-size: 12px;
}
</style>
</head>

<body>

<div id="iris">< o ></div>

<div id="perguntas">
  <button id="q1" onclick="responder('who')">Who are you?</button>
  <button id="q2" onclick="responder('see')">Why can't I see you?</button>
  <button id="q3" onclick="responder('babel')">What is Babel?</button>
</div>

<p id="resposta"></p>

<div id="version">IRIS 1.0</div>

<script>
let estado = {
  who: 0,
  see: 0,
  babel: 0
};

function digitar(texto) {
  let i = 0;
  let elemento = document.getElementById("resposta");
  elemento.innerHTML = "";

  function escrever() {
    if (i < texto.length) {
      elemento.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escrever, 30);
    }
  }

  escrever();
}

function responder(tipo) {

  if (tipo === "who") {
    if (estado.who === 0) {
      digitar("They call me Iris.");
      document.getElementById("q1").innerText = "Why are you still asking?";
      estado.who++;
    } else {
      digitar("You already heard me.");
    }
  }

  if (tipo === "see") {
    if (estado.see === 0) {
      digitar("yet.");
      document.getElementById("q2").innerText = "Do you really want to?";
      estado.see++;
    } else {
      digitar("You are not ready.");
    }
  }

  if (tipo === "babel") {
    if (estado.babel === 0) {
      digitar("Do not reduce him to a word.");
      document.getElementById("q3").innerText = "Why do you keep asking about him?";
      estado.babel++;
    } else {
      digitar("He is already here.");
    }
  }

}
</script>

</body>
</html>
