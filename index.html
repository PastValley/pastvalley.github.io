<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha IA Nativa v1.0</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #header { padding: 20px; text-align: center; border-bottom: 1px solid #334155; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user { background: var(--accent); color: #000; align-self: flex-end; }
        .ai { background: var(--panel); align-self: flex-start; border: 1px solid #334155; }
        #status { font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; }
        #input-area { padding: 20px; background: var(--panel); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        button { padding: 10px 20px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading-bar { height: 4px; background: var(--accent); width: 0%; transition: 0.3s; position: fixed; top: 0; }
    </style>
</head>
<body>

<div class="loading-bar" id="loader"></div>

<div id="header">
    <h1>Neural Local JS</h1>
    <div id="status">Iniciando motor de inteligência...</div>
</div>

<div id="chat-container">
    <div class="message ai">Olá! Estou carregando meu cérebro localmente no seu navegador. Isso pode demorar um pouco na primeira vez (vou baixar cerca de 200MB). Aguarde a barra de progresso.</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Aguarde o carregamento..." disabled>
    <button id="sendBtn" disabled>Enviar</button>
</div>

<!-- O SCRIPT MÁGICO QUE FAZ TUDO FUNCIONAR -->
<script type="module">
    // Importamos a biblioteca que permite rodar modelos de IA no Browser
    import * as webllm from "https://esm.run";

    const chatContainer = document.getElementById('chat-container');
    const status = document.getElementById('status');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const loader = document.getElementById('loader');

    // Configuração do Modelo (Llama-3 é um dos melhores do mundo)
    const selectedModel = "Llama-3-8B-Instruct-q4f32_1-MLC";
    
    let engine;

    async function init() {
        try {
            engine = await webllm.CreateMLCEngine(selectedModel, {
                initProgressCallback: (report) => {
                    status.innerText = report.text;
                    const prog = report.progress * 100;
                    loader.style.width = `${prog}%`;
                    if (prog >= 100) {
                        status.innerText = "IA Pronta e Offline!";
                        input.disabled = false;
                        btn.disabled = false;
                        input.placeholder = "Pergunte qualquer coisa...";
                    }
                }
            });
        } catch (e) {
            status.innerText = "Erro: Seu navegador/PC não suporta WebGPU (Tente o Chrome).";
            console.error(e);
        }
    }

    window.enviarMensagem = async () => {
        const text = input.value.trim();
        if (!text) return;

        // Adiciona mensagem do usuário
        addMessage(text, 'user');
        input.value = "";
        btn.disabled = true;

        // IA pensando...
        const aiMsgDiv = addMessage("Digitando...", 'ai');
        
        const messages = [
            { role: "system", content: "Você é uma IA prestativa que roda inteiramente no navegador via JavaScript." },
            { role: "user", content: text }
        ];

        const reply = await engine.chat.completions.create({ messages });
        aiMsgDiv.innerText = reply.choices[0].message.content;
        
        btn.disabled = false;
        chatContainer.scrollTop = chatContainer.scrollHeight;
    };

    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
    }

    btn.onclick = window.enviarMensagem;
    input.onkeypress = (e) => { if(e.key === 'Enter') window.enviarMensagem(); };

    init();
</script>

</body>
</html>
